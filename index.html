<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BAM Arabic</title>

<style>
body { font-family: Arial; text-align:center; background:#f5f5f5; }
.card { width:90%; max-width:400px; height:200px; margin:40px auto; perspective:1000px; }
.inner { width:100%; height:100%; transition:0.6s; transform-style:preserve-3d; }
.flipped { transform: rotateY(180deg); }
.face {
  position:absolute; width:100%; height:100%;
  display:flex; align-items:center; justify-content:center;
  font-size:26px; background:hsl(336, 75%, 30%); border-radius:10px;
  backface-visibility:hidden;
}
.back { transform: rotateY(180deg); background:#e3f2fd; }
button { padding:10px; margin:10px; }
</style>
</head>

<body>

<h2 id="status">Yükleniyor...</h2>

<input type="number" id="limit" placeholder="Kaç kelime?" />
<button onclick="start()">Başla</button>

<div class="card" onclick="flip()">
  <div class="inner" id="card">
    <div class="face" id="front"></div>
    <div class="face back" id="back"></div>
  </div>
</div>

<button onclick="answer(true)">Bildim</button>
<button onclick="answer(false)">Bilemedim</button>

<script>

// 🔴 BURAYI DEĞİŞTİR
const URL = "https://opensheet.elk.sh/1mQk1D3tTS6DC9N2LYvTADZXBXk1y5-NH1Wj82M4ZMjs/1";

let cards=[], current=[], wrong=[], i=0;

function shuffle(a){ return a.sort(()=>Math.random()-0.5); }

async function load(){
  let r = await fetch(URL);
  let d = await r.json();

  cards = d.map(x => ({
    front: x["Arapça"],
    back: x["Türkçe"]
  }));

  document.getElementById("status").innerText="Hazır";
}

function start(){
  let n = parseInt(limit.value);
  if(!n) return alert("sayı gir");

  current = shuffle([...cards]).slice(0,n);
  wrong = [];
  i=0;
  save();
  show();
}

function show(){
  if(i>=current.length) return next();

  let c = current[i];
  front.innerText = c.front;
  back.innerText = c.back;
  card.classList.remove("flipped");

  status.innerText = `${i+1}/${current.length}`;
}

function flip(){ card.classList.toggle("flipped"); }

function answer(ok){
  let c = current[i];

  if(!ok && !wrong.find(x=>x.front===c.front)){
    wrong.push(c);
  }

  i++;
  save();
  show();
}

function next(){
  if(wrong.length){
    alert("Yanlışlar tekrar 🔁");
    current = shuffle([...wrong]);
    wrong=[];
    i=0;
    save();
    show();
  }else{
    alert("Bitti 🎉");
    localStorage.clear();
  }
}

function save(){
  localStorage.setItem("c",JSON.stringify(current));
  localStorage.setItem("w",JSON.stringify(wrong));
  localStorage.setItem("i",i);
}

function loadState(){
  if(localStorage.getItem("c")){
    current = JSON.parse(localStorage.getItem("c"));
    wrong = JSON.parse(localStorage.getItem("w"));
    i = parseInt(localStorage.getItem("i"));
    show();
    return true;
  }
  return false;
}

load().then(()=>{
  if(!loadState()) status.innerText="Kelime sayısı gir";
});

</script>

</body>
</html>
