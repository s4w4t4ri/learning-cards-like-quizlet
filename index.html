<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BAM Arabic</title>

<style>
body { font-family: Arial; text-align:center; background:#881342; }
.card { width:90%; max-width:400px; height:200px; margin:40px auto; perspective:1000px; }
.inner { width:100%; height:100%; transition:0.6s; transform-style:preserve-3d; }
.flipped { transform: rotateY(180deg); }
.face {
  position:absolute; width:100%; height:100%;
  display:flex; align-items:center; justify-content:center;
  font-size:26px; background:white; border-radius:10px;
  backface-visibility:hidden;
}
.back { transform: rotateY(180deg); background:#e3f2fd; }
button { padding:10px; margin:10px; }
</style>
</head>

<body>

<h2 id="status">Seçim yapabilirsin!</h2>

<!-- 🔥 SHEET SEÇİM -->
<div>
  <label><input type="checkbox" id="s1" checked> Karışık </label>
  <input type="number" id="n1" placeholder="adet" style="width:60px">

  <label><input type="checkbox" id="s2"> A1</label>
  <input type="number" id="n2" placeholder="adet" style="width:60px">
</div>

<br>
<button onclick="start()">⋆⭒˚.⋆ Başla ⋆⭒˚.⋆</button>

<div class="card" onclick="flip()">
  <div class="inner" id="card">
    <div class="face" id="front"></div>
    <div class="face back" id="back"></div>
  </div>
</div>

<button onclick="answer(true)">Bildim</button>
<button onclick="answer(false)">Bilemedim</button>

<script>

// 🔴 SHEET URL'LERİN
const URLS = {
  s1: "https://opensheet.elk.sh/1mQk1D3tTS6DC9N2LYvTADZXBXk1y5-NH1Wj82M4ZMjs/Sayfa1",
  s2: "https://opensheet.elk.sh/1mQk1D3tTS6DC9N2LYvTADZXBXk1y5-NH1Wj82M4ZMjs/Sayfa2"
};

let current=[], wrong=[], i=0;

function shuffle(a){ return a.sort(()=>Math.random()-0.5); }

// 🚀 BAŞLAT
async function start(){

  current = [];
  wrong = [];
  i = 0;

  for(let key in URLS){

    let checked = document.getElementById(key).checked;
    let count = parseInt(document.getElementById("n"+key[1]).value);

    if(!checked || !count) continue;

    let r = await fetch(URLS[key]);
    let d = await r.json();

    let list = d.map(x => ({
      front: x["Arapça"],
      back: x["Türkçe"]
    }));

    list = shuffle(list).slice(0, count);

    current = current.concat(list);
  }

  if(current.length === 0){
    return alert("hiç veri seçmedin");
  }

  current = shuffle(current);

  save();
  show();
}

// 🔥 KART GÖSTER (BUG FIX'Lİ)
function show(){
  if(i>=current.length) return next();

  let c = current[i];

  // animasyonu kapat
  card.style.transition = "none";
  card.classList.remove("flipped");

  // zorla uygula
  card.offsetHeight;

  // geri aç
  card.style.transition = "0.6s";

  front.innerText = c.front;
  back.innerText = c.back;

  status.innerText = `${i+1}/${current.length}`;
}

function flip(){ card.classList.toggle("flipped"); }

// ✅ CEVAP
function answer(ok){
  let c = current[i];

  if(!ok && !wrong.find(x=>x.front===c.front)){
    wrong.push(c);
  }

  i++;
  save();
  show();
}

// 🔁 YANLIŞLAR TEKRAR
function next(){
  if(wrong.length){
    alert("Yanlışlar tekrar 🔁");
    current = shuffle([...wrong]);
    wrong=[];
    i=0;
    save();
    show();
  }else{
    alert("Bitti 🎉");
    localStorage.clear();
  }
}

// 💾 KAYDET
function save(){
  localStorage.setItem("c",JSON.stringify(current));
  localStorage.setItem("w",JSON.stringify(wrong));
  localStorage.setItem("i",i);
}

// 🔄 DEVAM ET
function loadState(){
  if(localStorage.getItem("c")){
    current = JSON.parse(localStorage.getItem("c"));
    wrong = JSON.parse(localStorage.getItem("w"));
    i = parseInt(localStorage.getItem("i"));
    show();
    return true;
  }
  return false;
}

// başlangıç
if(!loadState()){
  status.innerText="Sheet seç ve başla";
}

</script>

</body>
</html>
